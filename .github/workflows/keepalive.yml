# GitHub disables scheduled workflows in repositories with no activity for
# 60 days. The daily data workflow usually commits often enough to stay
# alive, but a quiet stretch (no new filings) could starve it. This monthly
# job resets the disable timer by re-enabling the schedules via the API.

name: Keepalive

on:
  schedule:
    - cron: "0 8 1 * *"
  workflow_dispatch:

permissions:
  actions: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Re-enable scheduled workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for wf in daily-data.yml keepalive.yml; do
            gh api -X PUT "repos/${{ github.repository }}/actions/workflows/$wf/enable" \
              && echo "enabled $wf" \
              || echo "::warning::could not enable $wf"
          done
